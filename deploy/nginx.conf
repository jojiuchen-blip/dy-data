limit_req_zone $binary_remote_addr zone=oauth_write_per_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=mcp_per_ip:10m rate=60r/m;

upstream api_upstream {
    server api:8000;
}

upstream web_upstream {
    server web:80;
}

upstream browser_upstream {
    server browser:6080;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name _;
    absolute_redirect off;

    client_max_body_size 64m;
    limit_req_status 429;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    location ^~ /.well-known/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /mcp {
        client_max_body_size 1m;
        limit_req zone=mcp_per_ip burst=30 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /authorize {
        client_max_body_size 16k;
        limit_req zone=oauth_write_per_ip burst=5 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /register {
        client_max_body_size 16k;
        limit_req zone=oauth_write_per_ip burst=5 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /token {
        client_max_body_size 16k;
        limit_req zone=oauth_write_per_ip burst=5 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /revoke {
        client_max_body_size 16k;
        limit_req zone=oauth_write_per_ip burst=5 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /agent.md {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /agent/SKILL.md {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /browser {
        return 302 /browser/vnc.html;
    }

    location = /browser/ {
        return 302 /browser/vnc.html;
    }

    location /browser/ {
        rewrite ^/browser/(.*)$ /$1 break;
        proxy_pass http://browser_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /browser;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /websockify {
        proxy_pass http://browser_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
