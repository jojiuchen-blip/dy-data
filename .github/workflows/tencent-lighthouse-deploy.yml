name: Tencent Lighthouse Deploy

"on":
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: tencent-lighthouse-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.TENCENT_DEPLOY_ON_PUSH == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run tests
        run: python -m pytest

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t dy-dashboard-api:ci .

      - name: Build Worker Docker image
        run: docker build -f apps/worker/Dockerfile -t dy-dashboard-worker:ci .

      - name: Build Browser Docker image
        run: docker build -f deploy/browser/Dockerfile -t dy-dashboard-browser:ci .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t dy-dashboard-web:ci apps/web

  deploy:
    name: Deploy Tencent Lighthouse
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' || vars.TENCENT_DEPLOY_ON_PUSH == 'true'
    timeout-minutes: 30

    env:
      TENCENT_HOST: ${{ vars.TENCENT_HOST }}
      TENCENT_SSH_PORT: ${{ vars.TENCENT_SSH_PORT }}
      TENCENT_SSH_USER: ${{ vars.TENCENT_SSH_USER }}
      TENCENT_APT_MIRROR: ${{ vars.TENCENT_APT_MIRROR }}
      TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
      TENCENT_KNOWN_HOSTS: ${{ secrets.TENCENT_KNOWN_HOSTS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required Tencent deployment settings
        run: |
          required=(
            TENCENT_HOST
            TENCENT_SSH_USER
            TENCENT_SSH_KEY
            TENCENT_KNOWN_HOSTS
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_lighthouse
          chmod 600 ~/.ssh/tencent_lighthouse
          printf '%s\n' "$TENCENT_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          port="${TENCENT_SSH_PORT:-22}"
          archive="/tmp/dy-dashboard-${GITHUB_SHA}.tar.gz"

          git archive --format=tar "$GITHUB_SHA" | gzip > /tmp/dy-dashboard-source.tar.gz
          scp -i ~/.ssh/tencent_lighthouse \
            -P "$port" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            /tmp/dy-dashboard-source.tar.gz \
            "$TENCENT_SSH_USER@$TENCENT_HOST:$archive"

          cat > /tmp/tencent-deploy-bootstrap.sh <<'REMOTE'
          set -euo pipefail
          target_sha="$1"
          archive_path="$2"
          app_dir="${APP_DIR:-/opt/dy-dashboard/repo}"
          log_dir="${LOG_DIR:-/opt/dy-dashboard/logs}"
          apt_mirror="${TENCENT_APT_MIRROR:-http://mirrors.tencentyun.com}"

          mkdir -p "$app_dir" "$log_dir"
          cd "$app_dir"
          if [ -d .git ] && (! git diff --quiet || ! git diff --cached --quiet); then
            dirty_stamp="$(date -u +%Y%m%dT%H%M%SZ)"
            git status --short > "$log_dir/pre-bootstrap-dirty-$dirty_stamp.status"
            git diff > "$log_dir/pre-bootstrap-dirty-$dirty_stamp.patch"
          fi

          find "$app_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          tar -xzf "$archive_path" -C "$app_dir"
          rm -f "$archive_path"

          SKIP_GIT_SYNC=true APT_MIRROR="$apt_mirror" bash deploy/tencent/deploy.sh "$target_sha"
          REMOTE
          ssh -i ~/.ssh/tencent_lighthouse \
            -p "$port" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$TENCENT_SSH_USER@$TENCENT_HOST" \
            "bash -s -- '$GITHUB_SHA' '$archive'" < /tmp/tencent-deploy-bootstrap.sh
