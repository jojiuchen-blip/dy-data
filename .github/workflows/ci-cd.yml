name: CI/CD

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dy-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run project governance gates
        run: |
          npm --prefix .agent/project-manager-suite run test:ai-pm
          node .agent/project-manager-suite/tools/verify-suite-lock.mjs .
          node .agent/project-manager-suite/tools/check-protocol-alignment.mjs .agent/project-manager-suite
          node .agent/project-manager-suite/tools/validate-global-files.mjs .
          node .agent/project-manager-suite/tools/route-check.mjs . --target-stage S1

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run tests
        run: python -m pytest

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t dy-dashboard-api:ci .

      - name: Build Worker Docker image
        run: docker build -f apps/worker/Dockerfile -t dy-dashboard-worker:ci .

      - name: Build Browser Docker image
        run: docker build -f deploy/browser/Dockerfile -t dy-dashboard-browser:ci .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t dy-dashboard-web:ci apps/web

  deploy:
    name: Deploy Railway
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.RAILWAY_DEPLOY_ENABLED == 'true'

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
      RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
      RAILWAY_WORKER_SERVICE_ID: ${{ vars.RAILWAY_WORKER_SERVICE_ID }}
      RAILWAY_BROWSER_SERVICE_ID: ${{ vars.RAILWAY_BROWSER_SERVICE_ID }}
      RAILWAY_WEB_SERVICE_ID: ${{ vars.RAILWAY_WEB_SERVICE_ID }}
      RAILWAY_WEB_URL: ${{ vars.RAILWAY_WEB_URL }}

    steps:
      - name: Skip Railway deployment when token is absent
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: |
          echo "::warning::RAILWAY_TOKEN secret is not configured; verification passed but Railway deployment is skipped."

      - name: Check required Railway settings
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          required=(
            RAILWAY_TOKEN
            RAILWAY_PROJECT_ID
            RAILWAY_ENVIRONMENT
            RAILWAY_API_SERVICE_ID
            RAILWAY_WORKER_SERVICE_ID
            RAILWAY_WEB_SERVICE_ID
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Check out repository
        if: ${{ env.RAILWAY_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Set up Node for Railway CLI
        if: ${{ env.RAILWAY_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: npm install -g @railway/cli

      - name: Deploy API
        if: ${{ env.RAILWAY_TOKEN != '' }}
        id: deploy_api
        run: |
          set +e
          output="$(railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_API_SERVICE_ID" \
            --detach \
            --json \
            --message "api ${GITHUB_SHA}" 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "::error::Railway API deployment command failed"
            exit "$status"
          fi
          deployment_id="$(echo "$output" | jq -r '.deploymentId')"
          if [ -z "$deployment_id" ] || [ "$deployment_id" = "null" ]; then
            echo "::error::Railway did not return an API deployment id"
            exit 1
          fi
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Wait for API deployment
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          wait_for_deployment() {
            service="$1"
            deployment_id="$2"
            for attempt in $(seq 1 60); do
              status="$(railway deployment list \
                --environment "$RAILWAY_ENVIRONMENT" \
                --service "$service" \
                --limit 20 \
                --json | jq -r --arg id "$deployment_id" '.[] | select(.id == $id) | .status' | head -n 1)"
              echo "attempt=$attempt service=$service deployment=$deployment_id status=${status:-not_found}"
              case "$status" in
                SUCCESS)
                  return 0
                  ;;
                FAILED|CRASHED|REMOVED)
                  railway logs "$deployment_id" \
                    --project "$RAILWAY_PROJECT_ID" \
                    --environment "$RAILWAY_ENVIRONMENT" \
                    --service "$service" \
                    --deployment \
                    --lines 100 || true
                  return 1
                  ;;
              esac
              sleep 10
            done
            echo "::error::Timed out waiting for Railway deployment $deployment_id"
            return 1
          }
          wait_for_deployment "$RAILWAY_API_SERVICE_ID" "${{ steps.deploy_api.outputs.deployment_id }}"

      - name: Deploy Worker
        if: ${{ env.RAILWAY_TOKEN != '' }}
        id: deploy_worker
        run: |
          set +e
          output="$(railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_WORKER_SERVICE_ID" \
            --detach \
            --json \
            --message "worker ${GITHUB_SHA}" 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "::error::Railway Worker deployment command failed"
            exit "$status"
          fi
          deployment_id="$(echo "$output" | jq -r '.deploymentId')"
          if [ -z "$deployment_id" ] || [ "$deployment_id" = "null" ]; then
            echo "::error::Railway did not return a Worker deployment id"
            exit 1
          fi
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Worker deployment
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          wait_for_deployment() {
            service="$1"
            deployment_id="$2"
            for attempt in $(seq 1 60); do
              status="$(railway deployment list \
                --environment "$RAILWAY_ENVIRONMENT" \
                --service "$service" \
                --limit 20 \
                --json | jq -r --arg id "$deployment_id" '.[] | select(.id == $id) | .status' | head -n 1)"
              echo "attempt=$attempt service=$service deployment=$deployment_id status=${status:-not_found}"
              case "$status" in
                SUCCESS)
                  return 0
                  ;;
                FAILED|CRASHED|REMOVED)
                  railway logs "$deployment_id" \
                    --project "$RAILWAY_PROJECT_ID" \
                    --environment "$RAILWAY_ENVIRONMENT" \
                    --service "$service" \
                    --deployment \
                    --lines 100 || true
                  return 1
                  ;;
              esac
              sleep 10
            done
            echo "::error::Timed out waiting for Railway deployment $deployment_id"
            return 1
          }
          wait_for_deployment "$RAILWAY_WORKER_SERVICE_ID" "${{ steps.deploy_worker.outputs.deployment_id }}"

      - name: Deploy Browser
        if: ${{ env.RAILWAY_TOKEN != '' && env.RAILWAY_BROWSER_SERVICE_ID != '' }}
        id: deploy_browser
        run: |
          set +e
          output="$(railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_BROWSER_SERVICE_ID" \
            --detach \
            --json \
            --message "browser ${GITHUB_SHA}" 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "::error::Railway Browser deployment command failed"
            exit "$status"
          fi
          deployment_id="$(echo "$output" | jq -r '.deploymentId')"
          if [ -z "$deployment_id" ] || [ "$deployment_id" = "null" ]; then
            echo "::error::Railway did not return a Browser deployment id"
            exit 1
          fi
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Browser deployment
        if: ${{ env.RAILWAY_TOKEN != '' && env.RAILWAY_BROWSER_SERVICE_ID != '' }}
        run: |
          wait_for_deployment() {
            service="$1"
            deployment_id="$2"
            for attempt in $(seq 1 60); do
              status="$(railway deployment list \
                --environment "$RAILWAY_ENVIRONMENT" \
                --service "$service" \
                --limit 20 \
                --json | jq -r --arg id "$deployment_id" '.[] | select(.id == $id) | .status' | head -n 1)"
              echo "attempt=$attempt service=$service deployment=$deployment_id status=${status:-not_found}"
              case "$status" in
                SUCCESS)
                  return 0
                  ;;
                FAILED|CRASHED|REMOVED)
                  railway logs "$deployment_id" \
                    --project "$RAILWAY_PROJECT_ID" \
                    --environment "$RAILWAY_ENVIRONMENT" \
                    --service "$service" \
                    --deployment \
                    --lines 100 || true
                  return 1
                  ;;
              esac
              sleep 10
            done
            echo "::error::Timed out waiting for Railway deployment $deployment_id"
            return 1
          }
          wait_for_deployment "$RAILWAY_BROWSER_SERVICE_ID" "${{ steps.deploy_browser.outputs.deployment_id }}"

      - name: Deploy Web
        if: ${{ env.RAILWAY_TOKEN != '' }}
        id: deploy_web
        run: |
          set +e
          output="$(railway up ./apps/web \
            --path-as-root \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_WEB_SERVICE_ID" \
            --detach \
            --json \
            --message "web ${GITHUB_SHA}" 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "::error::Railway Web deployment command failed"
            exit "$status"
          fi
          deployment_id="$(echo "$output" | jq -r '.deploymentId')"
          if [ -z "$deployment_id" ] || [ "$deployment_id" = "null" ]; then
            echo "::error::Railway did not return a Web deployment id"
            exit 1
          fi
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Web deployment
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          wait_for_deployment() {
            service="$1"
            deployment_id="$2"
            for attempt in $(seq 1 60); do
              status="$(railway deployment list \
                --environment "$RAILWAY_ENVIRONMENT" \
                --service "$service" \
                --limit 20 \
                --json | jq -r --arg id "$deployment_id" '.[] | select(.id == $id) | .status' | head -n 1)"
              echo "attempt=$attempt service=$service deployment=$deployment_id status=${status:-not_found}"
              case "$status" in
                SUCCESS)
                  return 0
                  ;;
                FAILED|CRASHED|REMOVED)
                  railway logs "$deployment_id" \
                    --project "$RAILWAY_PROJECT_ID" \
                    --environment "$RAILWAY_ENVIRONMENT" \
                    --service "$service" \
                    --deployment \
                    --lines 100 || true
                  return 1
                  ;;
              esac
              sleep 10
            done
            echo "::error::Timed out waiting for Railway deployment $deployment_id"
            return 1
          }
          wait_for_deployment "$RAILWAY_WEB_SERVICE_ID" "${{ steps.deploy_web.outputs.deployment_id }}"

      - name: Smoke test deployed site
        if: ${{ env.RAILWAY_TOKEN != '' && env.RAILWAY_WEB_URL != '' }}
        run: |
          curl --fail --silent --show-error "$RAILWAY_WEB_URL/" >/dev/null
          api_status="$(
            curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
              "$RAILWAY_WEB_URL/api/v1/auth/me"
          )"
          if [ "$api_status" != "401" ]; then
            echo "::error::Expected unauthenticated API probe to return 401, got $api_status"
            exit 1
          fi
