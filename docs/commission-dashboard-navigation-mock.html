<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>门店结算看板视觉规范 · DYDATA-23</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC",
          system-ui, sans-serif;
        --bg: #f5f5f2;
        --surface: #ffffff;
        --surface-soft: #f8faf8;
        --ink: #1b1c1d;
        --muted: #68706c;
        --line: #dfe3df;
        --line-strong: #cbd2cc;
        --brand: #d63b00;
        --brand-bright: #fe5205;
        --brand-soft: #fff4ef;
        --green: #116653;
        --green-soft: #eff8f5;
        --blue: #2f639a;
        --blue-soft: #f0f5fb;
        --shadow-card: 0 12px 28px rgb(18 26 22 / 0.07);
        --radius: 12px;
      }

      * { box-sizing: border-box; }
      html { background: var(--bg); }
      body { margin: 0; min-width: 0; color: var(--ink); background: var(--bg); }
      button, input, select { font: inherit; }
      button, select, input, a { outline-offset: 3px; }
      button:focus-visible, select:focus-visible, input:focus-visible, a:focus-visible {
        outline: 3px solid rgb(254 82 5 / 0.28);
      }
      a { color: inherit; }

      .workspace { min-height: 100vh; display: grid; grid-template-columns: 220px minmax(0, 1fr); }
      .rail {
        min-width: 0;
        padding: 28px 20px;
        color: #fff;
        background: #1d222a;
      }
      .brand { display: grid; gap: 4px; margin-bottom: 42px; }
      .brand strong { font-size: 22px; }
      .brand span, .rail-label { color: #aeb5be; font-size: 13px; }
      .rail-label { margin-bottom: 10px; }
      .rail-nav { display: grid; gap: 8px; }
      .rail-nav a {
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        border-left: 2px solid transparent;
        border-radius: 8px;
        color: #e8ebef;
        font-weight: 700;
        text-decoration: none;
      }
      .rail-nav a[aria-current="page"] {
        border-left-color: var(--brand-bright);
        background: #303743;
      }
      .rail-nav small { color: #f6b494; font-weight: 500; }

      .main-shell { min-width: 0; }
      .topbar {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 32px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .topbar strong { font-size: 20px; }
      .account { display: flex; align-items: center; gap: 10px; color: #4d534f; }
      .avatar {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: #23272d;
        font-weight: 800;
      }
      .page-wrap { min-width: 0; max-width: 1480px; margin: 0 auto; padding: 34px 32px 60px; }
      .preview-label { margin: 0 0 8px; color: var(--brand); font-weight: 800; }
      .page-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
      }
      .page-heading h1 { margin: 0; font-size: clamp(30px, 3vw, 46px); line-height: 1.12; }
      .page-heading p { max-width: 700px; margin: 12px 0 0; color: var(--muted); line-height: 1.7; }
      .source-pill, .quiet-badge, .direction-pill, .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid #d6e6df;
        border-radius: 999px;
        color: var(--green);
        background: #f7fbf9;
        white-space: nowrap;
      }
      .direction-pill { min-height: 30px; border-color: #f6ded4; color: #9e360e; background: var(--brand-soft); font-weight: 700; }
      .direction-pill--green { border-color: #d7e8e1; color: var(--green); background: var(--green-soft); }
      .status-pill { border-color: var(--line); color: var(--muted); background: #f1f3f1; font-weight: 700; }
      .quiet-badge { border-color: var(--line); color: var(--muted); background: #fff; }

      .peer-nav {
        display: flex;
        gap: 32px;
        margin: 28px 0;
        overflow-x: auto;
        border-bottom: 1px solid var(--line);
        scrollbar-width: thin;
      }
      .peer-nav a {
        min-height: 48px;
        display: flex;
        align-items: center;
        flex: 0 0 auto;
        border-bottom: 2px solid transparent;
        color: #666d69;
        font-size: 17px;
        font-weight: 800;
        text-decoration: none;
      }
      .peer-nav a[aria-current="page"] { border-color: var(--brand-bright); color: #8e2c09; }

      .filter-panel {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }
      .field { min-width: 0; display: grid; gap: 8px; }
      .field > span { color: #606762; font-size: 14px; font-weight: 800; }
      .field select, .field input {
        width: 100%;
        min-width: 0;
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid var(--line-strong);
        border-radius: 9px;
        color: var(--ink);
        background: #fff;
      }
      .field input::placeholder { color: #9aa19c; }
      .field select:disabled { color: #8a908c; background: #f3f4f2; }

      .metric-grid { display: grid; gap: 16px; margin: 18px 0 24px; }
      .metric-grid--four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .metric-grid--five { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .metric {
        min-width: 0;
        padding: 20px;
        border: 1px solid var(--line);
        border-top: 4px solid #898f8a;
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow-card);
      }
      .metric.blue { border-top-color: var(--blue); }
      .metric.green { border-top-color: var(--green); }
      .metric.orange { border-top-color: var(--brand-bright); }
      .metric-label { display: block; min-height: 42px; color: #5d645f; font-weight: 800; line-height: 1.45; }
      .metric-value { display: block; margin-top: 14px; font-size: clamp(22px, 2vw, 30px); line-height: 1.1; }
      .metric.blue .metric-value { color: var(--blue); }
      .metric.green .metric-value { color: var(--green); }
      .metric.orange .metric-value { color: var(--brand); }
      .metric-meta { display: block; margin-top: 12px; color: #858b87; font-size: 13px; }
      .metric-split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); margin-top: 12px; border-block: 1px solid var(--line); }
      .metric-slice { min-width: 0; padding: 12px 0; }
      .metric-slice + .metric-slice { padding-left: 14px; border-left: 1px solid var(--line); }
      .metric-slice span { display: block; color: #777e79; font-size: 12px; }
      .metric-slice strong { display: block; margin-top: 6px; overflow-wrap: anywhere; font-size: clamp(16px, 1.3vw, 21px); }
      .metric-slice:last-child strong { color: #989e9a; }

      .content-panel { margin-top: 22px; overflow: hidden; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); }
      .section-heading {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 18px;
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
      }
      .section-heading h2 { margin: 0; font-size: 24px; }
      .section-heading p { margin: 7px 0 0; color: var(--muted); line-height: 1.55; }
      .table-scroll { max-width: 100%; overflow-x: auto; }
      table { width: 100%; min-width: 920px; border-collapse: collapse; }
      th, td { padding: 15px 18px; border-bottom: 1px solid var(--line); text-align: left; }
      th { color: #555d58; background: #f3f4f1; font-size: 13px; }
      td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
      tbody tr:last-child td { border-bottom: 0; }
      tbody tr:hover { background: #fffaf7; }
      .own-row { background: #fff8f4; }
      .store-name { display: block; font-weight: 800; }
      .store-id { display: block; margin-top: 4px; color: #8a918c; font-size: 12px; }
      .rank { color: var(--brand); }
      .text-link { color: var(--brand); font-weight: 800; text-decoration-thickness: 1px; text-underline-offset: 3px; }
      .empty-state { padding: 34px; color: var(--muted); text-align: center; }
      .hidden { display: none !important; }

      .order-tabs {
        display: flex;
        gap: 10px;
        margin: 0 0 16px;
        overflow-x: auto;
      }
      .order-tab {
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        color: #555d58;
        background: #fff;
        font-weight: 800;
        white-space: nowrap;
        cursor: pointer;
      }
      .order-tab[aria-pressed="true"] { border-color: var(--brand); color: #8e2c09; background: var(--brand-soft); }
      .invoice-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; padding: 22px; }
      .invoice-step { min-height: 150px; display: grid; grid-template-columns: 54px 1fr; gap: 14px; padding: 20px; border: 1px solid #cfe1da; border-radius: 10px; background: #f4faf7; }
      .invoice-step.current { border-color: #ff8b5f; background: #fff4ef; }
      .invoice-step.future { border-color: var(--line); background: #fafafa; }
      .step-number { width: 50px; height: 44px; display: grid; place-items: center; border-radius: 9px; color: #fff; background: var(--green); font-weight: 900; }
      .invoice-step.current .step-number { background: var(--brand); }
      .invoice-step.future .step-number { background: #6e746f; }
      .invoice-step h3 { margin: 2px 0 8px; font-size: 19px; }
      .invoice-step p { margin: 0; color: var(--muted); line-height: 1.55; }
      .step-state { display: block; margin-top: 12px; color: var(--green); font-weight: 800; }
      .invoice-step.current .step-state { color: var(--brand); }

      @media (max-width: 1180px) {
        .metric-grid--four, .metric-grid--five { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 800px) {
        .workspace { grid-template-columns: 1fr; }
        .rail { padding: 16px 20px; }
        .brand { margin-bottom: 14px; }
        .rail-label { display: none; }
        .rail-nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .rail-nav a { justify-content: center; text-align: center; }
        .rail-nav a small { display: none; }
        .topbar { min-height: 60px; padding: 0 20px; }
        .account span:last-child { display: none; }
        .page-wrap { padding: 24px 20px 44px; }
        .page-heading { align-items: start; flex-direction: column; }
        .source-pill { white-space: normal; }
      }
      @media (max-width: 560px) {
        .rail-nav { grid-template-columns: 1fr 1fr; }
        .page-wrap { padding-inline: 14px; }
        .filter-panel, .metric-grid--four, .metric-grid--five, .invoice-grid { grid-template-columns: 1fr; }
        .peer-nav { gap: 22px; }
        .section-heading { align-items: start; flex-direction: column; padding: 18px; }
        .metric { padding: 18px; }
        .invoice-grid { padding: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="workspace">
      <aside class="rail">
        <div class="brand">
          <strong>经营引擎</strong>

          <div id="page"></div>
        </main>
      </div>
    </div>

      <section class="content-panel">

    <script>
      (function () {
        var pageRoot = document.getElementById("page");
        var routeLinks = Array.prototype.slice.call(document.querySelectorAll(".peer-nav [data-route]"));

        function routeInfo() {
          var raw = window.location.hash.replace(/^#\//, "");
          var parts = raw.split("?");
          var route = parts[0] || "ranking";
          if (["ranking", "store", "orders", "invoice"].indexOf(route) === -1) route = "ranking";
          return { route: route, params: new URLSearchParams(parts[1] || "") };
        }

        function setCurrentRoute(route) {
          routeLinks.forEach(function (link) {
            if (link.dataset.route === route) link.setAttribute("aria-current", "page");
            else link.removeAttribute("aria-current");
          });
        }

        function bindRanking() {
          var date = document.getElementById("ranking-date");
          var title = document.getElementById("ranking-title");
          var note = document.getElementById("ranking-note");
          var badge = document.getElementById("ranking-badge");
          var search = document.getElementById("ranking-search");
          var sort = document.getElementById("ranking-sort");
          var body = document.getElementById("ranking-rows");

          function refreshRows() {
            var cumulative = date.value === "all";
            var query = search.value.trim().toLowerCase();
            var rows = Array.prototype.slice.call(body.querySelectorAll(".ranking-data-row"));
            rows.sort(function (left, right) {
              return Number(right.dataset[sort.value]) - Number(left.dataset[sort.value]);
            });
            rows.forEach(function (row, index) {
              row.classList.toggle("hidden", cumulative || row.dataset.store.toLowerCase().indexOf(query) === -1);
              row.querySelector(".rank").textContent = String(index + 1).padStart(2, "0");
              body.insertBefore(row, body.querySelector(".ranking-empty-row"));
            });
            body.querySelector(".ranking-empty-row").classList.toggle("hidden", !cumulative);
            title.textContent = cumulative ? "全国门店累计销售情况榜单" : "全国门店销售情况榜单";
            note.textContent = cumulative ? "累计从 2026-08 正式账期开始，7 月测试数据不纳入" : date.options[date.selectedIndex].text + " 当月数据 · 按所选指标降序";
            badge.textContent = (cumulative ? "累计" : "当月") + " · 2,846 家门店";
          }
          date.addEventListener("change", refreshRows);
          search.addEventListener("input", refreshRows);
          sort.addEventListener("change", refreshRows);
        }

        function bindOrders(params) {
          var tabs = Array.prototype.slice.call(document.querySelectorAll("[data-direction]"));
          var heading = document.getElementById("orders-heading");
          var workbench = document.getElementById("orders-workbench");
          var monthSelect = document.getElementById("orders-month");
          var month = params.get("month");
          var hasMonthOption = Array.prototype.some.call(monthSelect.options, function (option) {
            return option.value === month;
          });
          if (month && hasMonthOption) {
            monthSelect.value = month;
          }
          ["month", "store", "product_scope", "product_type", "direction", "ratio", "version"].forEach(function (key) {
            if (params.get(key)) workbench.dataset[key] = params.get(key);
          });
          function selectDirection(direction) {
            tabs.forEach(function (tab) {
              var selected = tab.dataset.direction === direction;
              if (tab.classList.contains("order-tab")) tab.setAttribute("aria-pressed", selected ? "true" : "false");
              if (tab.classList.contains("order-row")) tab.classList.toggle("hidden", !selected);
            });
            heading.textContent = direction === "management" ? "管理服务费订单明细" : "推广费订单明细";
          }
          document.querySelectorAll(".order-tab[data-direction]").forEach(function (tab) {
            tab.addEventListener("click", function () { selectDirection(tab.dataset.direction); });
          });
          selectDirection(params.get("direction") === "management" ? "management" : "promotion");
          if (params.get("focus") === "workbench") {
            window.setTimeout(function () {
              document.getElementById("orders-workbench").scrollIntoView({ behavior: "smooth", block: "start" });
            }, 0);
          }
        }

        function render() {
          var info = routeInfo();
          var template = document.getElementById(info.route + "-template");
          var peerNav = document.querySelector(".peer-nav");
          peerNav.remove();
          pageRoot.replaceChildren(template.content.cloneNode(true));
          pageRoot.querySelector(".page-heading").after(peerNav);
          setCurrentRoute(info.route);
          if (info.route === "ranking") bindRanking();
          if (info.route === "orders") bindOrders(info.params);
          window.scrollTo({ top: 0, behavior: "auto" });
        }

        window.addEventListener("hashchange", render);
        render();
      })();
    </script>
