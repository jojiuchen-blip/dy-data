        <circle cx="244" cy="767" r="70" fill="url(#nodeGloss)"/>
        <circle cx="244" cy="767" r="69" stroke="#FFD3C8" stroke-opacity="0.24" stroke-width="2"/>
        <circle cx="244" cy="767" r="29" fill="url(#holeFill)"/>
        <circle cx="244" cy="767" r="30.5" stroke="#06111B" stroke-opacity="0.45" stroke-width="5"/>
        <circle cx="233" cy="754" r="19" fill="#FFFFFF" opacity="0.06"/>
      </g>
    </g>

    <g filter="url(#verifyShadow)">
