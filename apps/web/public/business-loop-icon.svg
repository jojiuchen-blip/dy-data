<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Business loop operations hub icon</title>
  <desc id="desc">Three operation inputs flow into a verified completion node, representing a closed-loop business operations hub.</desc>
  <defs>
