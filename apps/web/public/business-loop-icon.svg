      <stop offset="0.66" stop-color="#0B1723"/>
      <stop offset="1" stop-color="#07111B"/>
    </linearGradient>
    <radialGradient id="bgTopGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 130) rotate(51) scale(705 572)">
      <stop offset="0" stop-color="#52667A" stop-opacity="0.4"/>
      <stop offset="0.36" stop-color="#223445" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0A1420" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgBottomShade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(737 773) rotate(-128) scale(707 535)">
      <stop offset="0" stop-color="#02080E" stop-opacity="0.64"/>
      <stop offset="0.54" stop-color="#07111B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07111B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="appEdge" x1="166" y1="90" x2="861" y2="934" gradientUnits="userSpaceOnUse">
