      <stop offset="0.46" stop-color="#243343" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#030A11" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="topFlow" x1="237" y1="220" x2="641" y2="397" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#49BFFF"/>
      <stop offset="0.25" stop-color="#38D1F4"/>
      <stop offset="0.58" stop-color="#30D8D6"/>
      <stop offset="1" stop-color="#64EEC5"/>
    </linearGradient>
    <linearGradient id="midFlow" x1="241" y1="512" x2="644" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#70EFD0"/>
      <stop offset="0.37" stop-color="#35DCCC"/>
      <stop offset="0.7" stop-color="#2DD3DF"/>
