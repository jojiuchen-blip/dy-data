      <path d="M253 487H617" stroke="#FFFFFF" stroke-width="12" opacity="0.14"/>
      <path d="M253 740H304C362 740 371 642 451 613C482 602 509 602 533 602H614" stroke="#FFFFFF" stroke-width="12" opacity="0.13"/>
    </g>

    <g filter="url(#nodeShadow)">
