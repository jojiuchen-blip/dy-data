      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="blueNode" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(215 211) rotate(48) scale(116)">
      <stop offset="0" stop-color="#83F1FF"/>
      <stop offset="0.43" stop-color="#43C8FF"/>
      <stop offset="1" stop-color="#1A80FA"/>
    </radialGradient>
    <radialGradient id="mintNode" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(214 466) rotate(45) scale(116)">
      <stop offset="0" stop-color="#A6FFDC"/>
