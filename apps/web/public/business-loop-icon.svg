      <stop offset="1" stop-color="#2A9DD5"/>
    </linearGradient>
    <radialGradient id="verifyGloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(641 410) rotate(49) scale(196)">
