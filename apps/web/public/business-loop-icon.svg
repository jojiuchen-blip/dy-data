    </filter>
    <filter id="checkShadow" x="596" y="420" width="228" height="195" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#02080E" flood-opacity="0.42"/>
    </filter>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
