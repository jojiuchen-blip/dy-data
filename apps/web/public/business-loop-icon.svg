      <circle cx="704" cy="512" r="143" fill="url(#verifyOuter)"/>
      <circle cx="704" cy="512" r="143" fill="url(#verifyGloss)"/>
      <circle cx="704" cy="512" r="140.5" stroke="#C9FFF0" stroke-opacity="0.32" stroke-width="5"/>
      <circle cx="704" cy="512" r="104" fill="url(#verifyInner)"/>
      <circle cx="704" cy="512" r="105" stroke="#06111B" stroke-opacity="0.62" stroke-width="5"/>
      <path d="M608 428A128 128 0 0 1 770 410" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="11" stroke-linecap="round"/>
      <path d="M806 548A111 111 0 0 1 690 619" stroke="#06111B" stroke-opacity="0.28" stroke-width="10" stroke-linecap="round"/>
      <path d="M650 510L690 550L771 461" stroke="#06111B" stroke-opacity="0.45" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" filter="url(#checkShadow)"/>
      <path d="M650 510L690 550L771 461" stroke="url(#checkFill)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M650 493L690 533L771 444" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
