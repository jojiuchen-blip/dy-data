      <path d="M246 257H305C366 257 377 361 455 384C481 392 505 392 533 392H626" stroke="#07131D" stroke-width="76" opacity="0.36"/>
      <path d="M246 512H632" stroke="#07131D" stroke-width="76" opacity="0.34"/>
      <path d="M246 767H305C366 767 377 663 455 640C481 632 505 632 533 632H626" stroke="#07131D" stroke-width="76" opacity="0.36"/>

      <path d="M246 257H305C366 257 377 361 455 384C481 392 505 392 533 392H626" stroke="url(#topFlow)" stroke-width="59"/>
      <path d="M246 512H632" stroke="url(#midFlow)" stroke-width="59"/>
      <path d="M246 767H305C366 767 377 663 455 640C481 632 505 632 533 632H626" stroke="url(#bottomFlow)" stroke-width="59"/>

