        <circle cx="244" cy="257" r="70" fill="url(#blueNode)"/>
        <circle cx="244" cy="257" r="70" fill="url(#nodeGloss)"/>
        <circle cx="244" cy="257" r="69" stroke="#B7F7FF" stroke-opacity="0.24" stroke-width="2"/>
        <circle cx="244" cy="257" r="29" fill="url(#holeFill)"/>
        <circle cx="244" cy="257" r="30.5" stroke="#06111B" stroke-opacity="0.45" stroke-width="5"/>
        <circle cx="233" cy="244" r="19" fill="#FFFFFF" opacity="0.06"/>
      </g>
      <g>
        <circle cx="244" cy="512" r="70" fill="url(#mintNode)"/>
        <circle cx="244" cy="512" r="70" fill="url(#nodeGloss)"/>
        <circle cx="244" cy="512" r="69" stroke="#C9FFE9" stroke-opacity="0.24" stroke-width="2"/>
        <circle cx="244" cy="512" r="29" fill="url(#holeFill)"/>
        <circle cx="244" cy="512" r="30.5" stroke="#06111B" stroke-opacity="0.45" stroke-width="5"/>
        <circle cx="233" cy="499" r="19" fill="#FFFFFF" opacity="0.06"/>
