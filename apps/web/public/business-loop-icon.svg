    <rect x="72" y="72" width="880" height="880" rx="184" fill="url(#bgTopGlow)"/>
    <rect x="72" y="72" width="880" height="880" rx="184" fill="url(#bgBottomShade)"/>
    <rect x="73.5" y="73.5" width="877" height="877" rx="182.5" stroke="url(#appEdge)" stroke-width="3"/>
  </g>

  <g clip-path="url(#appClip)">
    <ellipse cx="700" cy="604" rx="176" ry="128" fill="#02070D" opacity="0.24" filter="url(#blurGlow)"/>
    <ellipse cx="300" cy="786" rx="180" ry="86" fill="#02070D" opacity="0.22" filter="url(#blurGlow)"/>

